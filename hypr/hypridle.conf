general {
    # Lock screen command, if not specified in a listener
    lock_cmd = hyprlock 

    # Command to run before sleeping (e.g., locking the screen)
    before_sleep_cmd = loginctl lock-session

    # Command to run after resuming from sleep (e.g., turning the monitor back on)
    after_sleep_cmd = hyprctl dispatch dpms on 
}

# Listener 1: Notify after 5 minutes of inactivity
listener {
    timeout = 300 # 5 minutes in seconds
    on-timeout = notify-send "Em breve vai bloquear..."
}

# Listener 2: Lock the screen after 10 minutes of inactivity
listener {
    timeout = 600 # 10 minutes in seconds
    on-timeout = hyprlock 
}

# Listener 3: Turn off the monitor after 15 minutes of inactivity
listener {
    timeout = 900 # 15 minutes in seconds
    on-timeout = hyprctl dispatch dpms off 
    on-resume = hyprctl dispatch dpms on # Turn monitor back on upon resume
}

# Listener 4: Suspend the system after 30 minutes of inactivity
listener {
    timeout = 1800 # 30 minutes in seconds
    on-timeout = systemctl suspend # Suspend the system
}
