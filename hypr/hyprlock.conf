# Configuração gerada automaticamente
# Wallpaper atual: /home/andre/.config/wallpapers/Northern Lights3.png

font_family = Nasalization
wallpaper = ~/.cache/current_wallpaper.png
profile = /home/andre/Documentos/eu.png
inner_color  = #c8c8c8
border_color = #111111
gradient = #30bfee, #01ee8f 45deg

general {
    ignore_empty_input = true
    grace = 0
}

# Background
background {
    monitor =
    path = ~/.cache/current_wallpaper.png
    brightness = 0.5
    blur_passes = 2 # 0 disables blurring
    blur_size = 7
}

# Profile Picture
image {
    monitor =
    path = /home/andre/Documentos/eu.png
    size = 110
    rounding = 10
    border_size = 4
    border_color = 

    position = 20, -20
    halign = left
    valign = top
    zindex = 1
}

# User Info
label {
    monitor =
    text = cmd[update:1000000] echo -e "andre\n \n7.1.3-arch1-2\nPacotes: \n1039 pacman\n13 aur\n11 flatpak"
    shadow_boost = 0.5
    shadow_passes = 1
    color = 
    font_size = 11
    font_family = Nasalization

    position = 170, -35
    halign = left
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "sexta, 10 julho 2026" </b>"
    color = 
    font_size = 30
    font_family = Nasalization
    position = 0, 200
    halign = center
    valign = center
}

# TIME HR
label {
    monitor =
    text = cmd[update:1000] date +"%H:"
    color = 
    shadow_size = 3
    shadow_color = rgb(0,0,0)
    shadow_boost = 1.2
    font_size = 200
    font_family = Nasalization
    position = -410, -10
    halign = center
    valign = center
    zindex = 5
}

# TIME MIN
label {
    monitor =
    text = cmd[update:1000] date +"%M:"
    color = 
    font_size = 200
    font_family = Nasalization
    position = 10, -15
    halign = center
    valign = center
    zindex = 5
}

# TIME SEC
label {
    monitor =
    text = cmd[update:1000] date +"%S"
    color = 
    shadow_size = 3
    shadow_color = rgb(0,0,0)
    shadow_boost = 1.2
    font_size = 200
    font_family = Nasalization
    position = 400, -6
    halign = center
    valign = center
    zindex = 5
}

# Input Field
input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = 
    inner_color = 
    font_color = white
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = Digite a senha...</i>
    hide_input = false
    rounding = -1
    check_color = blue
    fail_color = red
    fail_text = <i> <b>()</b></i>
    fail_transition = 300
    capslock_color = 
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -200
    halign = center
    valign = center
}

