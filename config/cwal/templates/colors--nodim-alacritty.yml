colors:

  primary:
    background: "{background}"
    foreground: "{foreground}"

  cursor:
    text: "{background}"
    cursor: "{foreground}"

  vi_mode_cursor:
    text: "{background}"
    cursor: "{foreground}"

  search:
    matches:
      foreground: '{color0}'
      background: '{color15}'
    focused_match:
      foreground: "{background}"
      background: "{color1}"

  line_indicator:
    foreground: None
    background: None

  footer_bar:
    foreground: '{color8}'
    background: '{color7}'

  selection:
    text: "{background}"
    background: "{color1}"

  normal:
    black: "{color0}"
    red: "{color1}"
    green: "{color2}"
    yellow: "{color3}"
    blue: "{color4}"
    magenta: "{color5}"
    cyan: "{color6}"
    white: "{color7}"

  bright:
    black: "{color8}"
    red: "{color9}"
    green: "{color10}"
    yellow: "{color11}"
    blue: "{color12}"
    magenta: "{color13}"
    cyan: "{color14}"
    white: "{color15}"
